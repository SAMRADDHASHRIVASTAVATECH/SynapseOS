services:
  atlas-control:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-atlas-control:latest
    container_name: atlas-control
    ports:
      - "3847:3847"
    volumes:
      - atlas-data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  dashboard:
    image: node:20-alpine
    container_name: atlas-dashboard
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev:web -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  atlas-data:
    name: atlas-control-data
